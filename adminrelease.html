<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official website for the Office of Student Affairs at Technological University of the Philippines - Cavite.">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="adminrelease.css">

    <title>Admin Release</title>

</head>

<body>

    <script src="navbaradmin.js"></script>

    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="contact-box2 shadow-lg p-4 rounded text-center">
            <form>
                <label for="numberInput" class="form-label">Enter Number</label>
                <input type="text" id="numberInput" class="form-control mb-3" placeholder="Enter Number" pattern="[0-9]*" inputmode="numeric">
                <div class="d-flex justify-content-center gap-2">
                    <button type="button" id="addButton" class="btn btn-primary">Add</button>
                </div>
            </form>

            <!-- Table to Display Numbers -->
            <div class="container mt-4">
                <div class="container mt-4" style="background: none !important;">
                    <table class="table table-bordered text-center" style="background: none !important;">
                        <thead>
                            <tr>
                                <th>Number</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="numbersTableBody">
                            <!-- Numbers will be dynamically added here -->
                        </tbody>
                    </table>
                </div>                
            </div>
        
        </div>
    </div>

    <script src="footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="fire-basescript.js"></script>

</body>
</html>
